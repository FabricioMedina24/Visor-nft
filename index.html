<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor NFT 3D Premium</title>
    
    <link rel="stylesheet" href="./style.css">

    <style>
        /* Pantalla de fondo fija elegante */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            background-color: #0b0b0b; 
        }

        /* Contenedor del cargador lujoso */
        .loader-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        /* Anillo exterior de oro líquido con brillo y sombra de neón */
        .spinner {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 20%, #dfa837 50%, #fff4d0 70%, #dfa837 90%, transparent 100%);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 100%);
            mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 100%);
            animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0 0 12px rgba(223, 168, 55, 0.65));
        }

        /* Anillo interno decorativo de cristal fino */
        .inner-ring {
            position: absolute;
            width: calc(100% - 10px);
            height: calc(100% - 10px);
            border: 1px solid rgba(223, 168, 55, 0.2);
            border-radius: 50%;
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.05);
        }

        /* Texto elegante con tipografía sofisticada */
        .loading-text {
            color: #ffffff;
            font-family: 'Times New Roman', Times, serif, sans-serif;
            font-size: 11px;
            font-style: italic;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.9;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 10px rgba(223, 168, 55, 0.3);
            text-align: center;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="loader-wrapper">
            <div class="spinner"></div>
            <div class="inner-ring"></div>
        </div>
        <div class="loading-text">Restoring the Legacy...</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="./app.js"></script>
</body>
</html>
