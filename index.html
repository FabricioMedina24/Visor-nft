<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor NFT 3D</title>
    
    <link rel="stylesheet" href="./style.css">

    <style>
        /* Pantalla de carga fija absoluta en el centro */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999; /* Por encima de cualquier canvas 3D */
            background-color: #111111; 
        }

        /* El anillo giratorio dorado */
        .spinner {
            width: 65px;
            height: 65px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #dfa837; /* El tono oro de tus marcos */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Texto elegante debajo del anillo */
        .loading-text {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Cargando Obra de Arte...</div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
      }
    </script>

    <script type="module" src="./app.js"></script>
</body>
</html>
